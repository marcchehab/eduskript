version: '3.8'

services:
  nginx:
    image: nginxproxymanager/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./nginx/data:/data
      - ./nginx/letsencrypt:/etc/letsencrypt
    networks:
      - app-network

  eduskript:
    image: ghcr.io/${GITHUB_REPOSITORY:-eduskript/eduskript}:latest
    container_name: eduskript-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/database.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=10485760
      - ALLOWED_FILE_TYPES=jpg,jpeg,png,gif,webp,svg,pdf,doc,docx,txt,md,zip,mp4,mp3,wav
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    networks:
      - app-network
    depends_on:
      - nginx

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - REPO_USER=${GITHUB_ACTOR}
      - REPO_PASS=${GITHUB_TOKEN}
    command: --interval 300 eduskript-app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  data:
  uploads: