<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: transparent; }
  .wrapper { padding: 12px; }
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 0 0 8px;
    font-size: 13px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .controls label {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .controls input[type="range"] { width: 100px; }
  .controls span {
    min-width: 28px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  #info {
    font-size: 12px;
    text-align: center;
    margin-bottom: 6px;
    opacity: 0.5;
  }
  #clock-container {
    width: 100%;
    max-width: 680px;
    margin: 0 auto;
  }
</style>

<div class="wrapper" id="wrapper">
  <div class="controls" id="controls">
    <label id="lbl-mod">Modulus <input type="range" id="modSlider" min="3" max="29" value="7" step="1"><span id="modVal">7</span></label>
    <label id="lbl-max">Max <input type="range" id="maxSlider" min="20" max="500" value="500" step="10"><span id="maxVal">500</span></label>
    <label id="lbl-font">Font <input type="range" id="fontSlider" min="4" max="14" value="7" step="1"><span id="fontVal">7</span></label>
  </div>
  <div id="info"></div>
  <div id="clock-container"></div>
</div>

<script>
  var plugin = eduskript.init();
  var isDark = false;
  var lang = 'en';

  var i18n = {
    en: { modulus: 'Modulus', max: 'Max', font: 'Font', title: 'Clock mod', to: 'to', numbers: 'numbers', rings: 'rings', spokes: 'spokes' },
    de: { modulus: 'Modulus', max: 'Max', font: 'Schrift', title: 'Uhr mod', to: 'bis', numbers: 'Zahlen', rings: 'Ringe', spokes: 'Speichen' }
  };

  var modSlider = document.getElementById('modSlider');
  var maxSlider = document.getElementById('maxSlider');
  var fontSlider = document.getElementById('fontSlider');
  var modValEl = document.getElementById('modVal');
  var maxValEl = document.getElementById('maxVal');
  var fontValEl = document.getElementById('fontVal');
  var infoEl = document.getElementById('info');
  var container = document.getElementById('clock-container');

  function t(key) { return (i18n[lang] || i18n.en)[key] || key; }

  function applyTheme(theme) {
    isDark = theme === 'dark';
    var w = document.getElementById('wrapper');
    w.style.color = isDark ? '#ccc' : '#333';
    var ctrls = document.getElementById('controls');
    ctrls.style.color = isDark ? 'rgba(200,200,220,0.7)' : 'rgba(60,60,80,0.7)';
    infoEl.style.color = isDark ? 'rgba(180,180,200,0.5)' : 'rgba(80,80,100,0.5)';
    var inputs = document.querySelectorAll('input[type="range"]');
    for (var i = 0; i < inputs.length; i++) {
      inputs[i].style.accentColor = isDark ? '#6666cc' : '#4444aa';
    }
    draw();
  }

  function applyLabels() {
    document.getElementById('lbl-mod').childNodes[0].textContent = t('modulus') + ' ';
    document.getElementById('lbl-max').childNodes[0].textContent = t('max') + ' ';
    document.getElementById('lbl-font').childNodes[0].textContent = t('font') + ' ';
  }

  function draw() {
    var mod = parseInt(modSlider.value);
    var maxN = parseInt(maxSlider.value);
    var fontSize = parseInt(fontSlider.value);
    modValEl.textContent = mod;
    maxValEl.textContent = maxN;
    fontValEl.textContent = fontSize;

    var totalRings = Math.ceil((maxN + 1) / mod);
    infoEl.textContent = (maxN + 1) + ' ' + t('numbers') + ', ' + totalRings + ' ' + t('rings') + ', ' + mod + ' ' + t('spokes');

    var size = 680;
    var cx = size / 2;
    var cy = size / 2;
    var margin = 28;
    var innerR = 18;
    var maxR = cx - margin;
    var ringStep = Math.max((maxR - innerR) / totalRings, 2);

    var bg = isDark ? '#0a0a18' : '#f8f8fc';
    var ringStroke = isDark ? 'rgba(80,80,200,0.45)' : 'rgba(80,80,200,0.25)';
    var spokeStroke = isDark ? 'rgba(140,140,160,0.18)' : 'rgba(100,100,140,0.15)';
    var textFill = isDark ? 'rgba(220,220,240,0.92)' : 'rgba(30,30,60,0.85)';
    var titleFill = isDark ? 'rgba(180,180,200,0.65)' : 'rgba(80,80,120,0.6)';

    var svg = '<svg width="100%" viewBox="0 0 ' + size + ' ' + size + '" xmlns="http://www.w3.org/2000/svg">';
    svg += '<rect x="0" y="0" width="' + size + '" height="' + size + '" rx="12" fill="' + bg + '"/>';
    svg += '<text x="' + cx + '" y="18" text-anchor="middle" fill="' + titleFill + '" font-family="sans-serif" font-size="13" font-weight="500">' + t('title') + ' ' + mod + ' ' + t('to') + ' ' + maxN + '</text>';

    // Spokes
    for (var i = 0; i < mod; i++) {
      var angle = (2 * Math.PI * i / mod) - Math.PI / 2;
      var x2 = cx + Math.cos(angle) * (maxR + 6);
      var y2 = cy + Math.sin(angle) * (maxR + 6);
      svg += '<line x1="' + cx + '" y1="' + cy + '" x2="' + x2 + '" y2="' + y2 + '" stroke="' + spokeStroke + '" stroke-width="0.5" stroke-dasharray="4 4"/>';
    }

    // Rings
    for (var ring = 0; ring < totalRings; ring++) {
      var r = innerR + (ring + 1) * ringStep;
      if (r > 0) {
        svg += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + ringStroke + '" stroke-width="0.5"/>';
      }
    }

    // Numbers
    for (var n = 0; n <= maxN; n++) {
      var spoke = n % mod;
      var nRing = Math.floor(n / mod);
      var nr = innerR + (nRing + 0.5) * ringStep;
      var sectorAngle = 2 * Math.PI / mod;
      var nAngle = sectorAngle * spoke + sectorAngle / 2 - Math.PI / 2;
      var nx = cx + Math.cos(nAngle) * nr;
      var ny = cy + Math.sin(nAngle) * nr;
      var fs = Math.max(fontSize - Math.floor(nRing / 12), 4);
      svg += '<text x="' + nx + '" y="' + ny + '" text-anchor="middle" dominant-baseline="central" fill="' + textFill + '" font-family="sans-serif" font-size="' + fs + '">' + n + '</text>';
    }

    svg += '</svg>';
    container.innerHTML = svg;

    saveState();
  }

  function saveState() {
    plugin.setData({
      state: {
        mod: parseInt(modSlider.value),
        max: parseInt(maxSlider.value),
        font: parseInt(fontSlider.value)
      },
      updatedAt: Date.now()
    });
  }

  plugin.onReady(function(ctx) {
    lang = (ctx.config && ctx.config.lang) || 'en';

    // Apply config defaults
    if (ctx.config) {
      // Hard ceiling: 200 spokes is the point past which labels collide.
      if (ctx.config.modmax) modSlider.max = Math.max(3, Math.min(200, parseInt(ctx.config.modmax)));
      var modCap = parseInt(modSlider.max);
      if (ctx.config.mod) modSlider.value = Math.max(3, Math.min(modCap, parseInt(ctx.config.mod)));
      if (ctx.config.max) maxSlider.value = Math.max(20, Math.min(500, parseInt(ctx.config.max)));
      if (ctx.config.font) fontSlider.value = Math.max(4, Math.min(14, parseInt(ctx.config.font)));
    }

    // Restore saved state — clamp to current slider cap in case modmax was lowered.
    if (ctx.data && ctx.data.state) {
      var s = ctx.data.state;
      if (s.mod) modSlider.value = Math.min(parseInt(modSlider.max), s.mod);
      if (s.max) maxSlider.value = s.max;
      if (s.font) fontSlider.value = s.font;
    }

    applyLabels();
    applyTheme(ctx.theme);
  });

  plugin.onThemeChange(function(theme) {
    applyTheme(theme);
  });

  modSlider.addEventListener('input', draw);
  maxSlider.addEventListener('input', draw);
  fontSlider.addEventListener('input', draw);
</script>
